<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artificial Intelligence Presentation - NeuroNova</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }

        body {
            background:
                radial-gradient(circle at top right, #2563eb 0%, transparent 35%),
                radial-gradient(circle at bottom left, #0f766e 0%, transparent 40%),
                linear-gradient(135deg, #0b1120, #111827, #020617);

            color: #f8fafc;
        }

        /* Top Header Fixed */
        .fixed-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px 30px;
            background: rgba(3, 7, 18, 0.85);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(59, 130, 246, 0.2);
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .team-name {
            font-size: 16pt;
            font-weight: 800;
            color: #3b82f6;
            letter-spacing: 1px;
            text-transform: none;
        }

        .sir-name {
            font-size: 11pt;
            color: #9ca3af;
        }

        .sir-name span {
            color: #f3f4f6;
            font-weight: 600;
        }

        .presentation-container {
            position: relative;
            width: 100%;
            height: 100vh;
            padding-top: 80px;
        }

        .slide {
            position: absolute;
            top: 80px;
            left: 0;
            width: 100%;
            height: calc(100vh - 80px);
            padding: 40px;
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }

        .slide.active {
            display: block;
            opacity: 1;
        }

        .flex-layout {
            display: flex;
            height: 100%;
            align-items: center;
            gap: 40px;
        }

        .col-6 {
            flex: 1;
        }

        .text-center {
            text-align: center;
            width: 100%;
        }

        h1 {
            font-size: 36pt;
            color: #ffffff;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        h1 span {
            color: #3b82f6;
        }

        h2 {
            font-size: 24pt;
            color: #3b82f6;
            margin-bottom: 25px;
            border-left: 5px solid #3b82f6;
            padding-left: 15px;
        }

        h3 {
            font-size: 15pt;
            color: #60a5fa;
            margin-bottom: 10px;
        }

        p {
            font-size: 13pt;
            line-height: 1.6;
            color: #d1d5db;
            margin-bottom: 15px;
        }

        .timeline-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 65vh;
            overflow-y: auto;
        }

        .timeline-item {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(59, 130, 246, 0.2);
            padding: 12px 20px;
            border-radius: 8px;
        }

        .timeline-year {
            font-weight: bold;
            color: #3b82f6;
            font-size: 13pt;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .card {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 15px;
        }

        .card-num {
            background: #3b82f6;
            color: white;
            width: 25px;
            height: 25px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 10pt;
            font-weight: bold;
            margin-bottom: 10px;
        }

        ul {
            list-style: none;
        }

        li {
            font-size: 12pt;
            margin-bottom: 12px;
            position: relative;
            padding-left: 30px;
            text-align: left;
            color: #e5e7eb;
        }

        li::before {
            content: "✓";
            position: absolute;
            left: 0;
            color: #10b981;
            font-weight: bold;
            font-size: 14pt;
        }

        .disadvantages li::before {
            content: "✕";
            color: #ef4444;
        }

        /* Stable Local Path Images style */
        .slide-img {
            width: 100%;
            max-width: 500px;
            max-height: 65vh;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            border: 2px solid rgba(59, 130, 246, 0.3);
            object-fit: contain;
        }

        .nav-btn {
            position: fixed;
            bottom: 30px;
            background: rgba(30, 41, 59, 0.8);
            border: 1px solid rgba(59, 130, 246, 0.4);
            color: white;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            font-size: 20pt;
            cursor: pointer;
            z-index: 1000;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:hover {
            background: #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.6);
        }

        #prevBtn {
            right: 105px;
        }

        #nextBtn {
            right: 40px;
        }

        .slide-footer {
            position: fixed;
            bottom: 20px;
            left: 40px;
            font-size: 10pt;
            color: #6b7280;
        }
    </style>

    <style>
        .slide {
            display: block !important;
            visibility: hidden;
            pointer-events: none;
            opacity: 0;
            transform: translateX(80px) scale(.98);
            transition: opacity .7s, transform .7s, visibility 0s .7s
        }

        .slide.active {
            visibility: visible;
            pointer-events: auto;
            opacity: 1;
            transform: translateX(0) scale(1);
            transition: opacity .7s, transform .7s
        }

        .slide.active h1,
        .slide.active h2,
        .slide.active h3,
        .slide.active p,
        .slide.active li,
        .slide.active .card,
        .slide.active .timeline-item,
        .slide.active .slide-img {
            animation: fadeUp .7s both
        }

        .slide.active .slide-img {
            animation: zoomIn .9s both
        }

        .slide.active li:nth-child(1),
        .slide.active .card:nth-child(1) {
            animation-delay: .1s
        }

        .slide.active li:nth-child(2),
        .slide.active .card:nth-child(2) {
            animation-delay: .2s
        }

        .slide.active li:nth-child(3),
        .slide.active .card:nth-child(3) {
            animation-delay: .3s
        }

        .slide.active li:nth-child(4),
        .slide.active .card:nth-child(4) {
            animation-delay: .4s
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(25px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        @keyframes zoomIn {
            from {
                opacity: 0;
                transform: scale(.85)
            }

            to {
                opacity: 1;
                transform: scale(1)
            }
        }
    </style>
</head>

<body>

    <div class="fixed-header">
        <div class="team-name">Team: NeuroNova</div>
        <div class="sir-name">Presented To: <span>Md. Mamonur Rashid</span></div>
    </div>

    <div class="presentation-container">

        <div class="slide">
            <div class="full-image-slide">
                <img class="slide-img" src="./images/1.jpeg" alt="Slide 1">
            </div>
            <div class="slide-footer">Slide 1 of 11</div>
        </div>

        <div class="slide">
            <div class="full-image-slide">
                <img class="slide-img" src="./images/2.jpeg" alt="Slide 2">
            </div>
            <div class="slide-footer">Slide 2 of 11</div>
        </div>

        <div class="slide">
            <div class="full-image-slide">
                <img class="slide-img" src="./images/3.jpeg" alt="Slide 3">
            </div>
            <div class="slide-footer">Slide 3 of 11</div>
        </div>

        <div class="slide">
            <div class="full-image-slide">
                <img class="slide-img" src="./images/4.jpeg" alt="Slide 3">
            </div>
            <div class="slide-footer">Slide 4 of 11</div>
        </div>

        <div class="slide">
            <div class="full-image-slide">
                <img class="slide-img" src="./images/5.jpeg" alt="Slide 3">
            </div>
            <div class="slide-footer">Slide 5 of 11</div>
        </div>

        <div class="slide">
            <div class="full-image-slide">
                <img class="slide-img" src="./images/6.jpeg" alt="Slide 3">
            </div>
            <div class="slide-footer">Slide 6 of 11</div>
        </div>

        <div class="slide">
            <div class="full-image-slide">
                <img class="slide-img" src="./images/7.jpeg" alt="Slide 3">
            </div>
            <div class="slide-footer">Slide 7 of 11</div>
        </div>

        <div class="slide">
            <div class="full-image-slide">
                <img class="slide-img" src="./images/8.jpeg" alt="Slide 3">
            </div>
            <div class="slide-footer">Slide 8 of 11</div>
        </div>

        <div class="slide">
            <div class="full-image-slide">
                <img class="slide-img" src="./images/9.jpeg" alt="Slide 3">
            </div>
            <div class="slide-footer">Slide 9 of 11</div>
        </div>

        <div class="slide">
            <div class="full-image-slide">
                <img class="slide-img" src="./images/10.jpeg" alt="Slide 3">
            </div>
            <div class="slide-footer">Slide 10 of 11</div>
        </div>

        <div class="slide">
            <div class="full-image-slide">
                <img class="slide-img" src="./images/11.jpeg" alt="Slide 3">
            </div>
            <div class="slide-footer">Slide 11 of 11</div>
        </div>

    </div>

    <button id="prevBtn" class="nav-btn">&larr;</button>
    <button id="nextBtn" class="nav-btn">&rarr;</button>

    <script>
        const slides = document.querySelectorAll('.slide');
        let currentSlide = 0;
        function showSlide(index) {
            slides[currentSlide].classList.remove('active');
            currentSlide = (index + slides.length) % slides.length;
            slides[currentSlide].classList.add('active');
        }
        document.getElementById('prevBtn').addEventListener('click', () => showSlide(currentSlide - 1));
        document.getElementById('nextBtn').addEventListener('click', () => showSlide(currentSlide + 1));
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') showSlide(currentSlide + 1);
            else if (e.key === 'ArrowLeft') showSlide(currentSlide - 1);
        });
    </script>
</body>

</html>
